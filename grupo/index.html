  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      width:100%;
      height:100vh;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      font-family:'Inter',sans-serif;
      color:white;
      position:relative;
    }

    body::before{
      content:"";
      position:absolute;
      inset:0;

      background:
      radial-gradient(
        circle at center,
        rgba(255,255,255,0.035) 0%,
        rgba(255,255,255,0) 60%
      );

      pointer-events:none;
    }

    .wrapper{
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:34px;

      animation:fadeIn 1.5s ease;

      position:relative;
      z-index:2;
    }

    .logo{
      width:150px;

      opacity:0;
      transform:translateY(10px) scale(.96);

      animation:logoReveal 1.5s ease forwards;

      filter:
      drop-shadow(0 10px 30px rgba(255,255,255,0.06));
    }

    .progress-container{
      width:300px;
      height:2px;

      background:rgba(255,255,255,0.12);

      position:relative;
      overflow:hidden;

      border-radius:999px;
    }

    .progress-bar{
      position:absolute;
      left:0;
      top:0;

      width:0%;
      height:100%;

      border-radius:999px;

      background:
      linear-gradient(
      90deg,
      rgba(255,255,255,0.35),
      rgba(255,255,255,1),
      rgba(255,255,255,0.45));

      animation:
      loading 7s cubic-bezier(.65,.05,.36,1) forwards;
    }

    .text{
      max-width:520px;

      text-align:center;
      line-height:1.7;

      font-size:17px;
      font-weight:300;

      color:rgba(255,255,255,0.88);

      letter-spacing:-0.02em;

      opacity:0;
      transform:translateY(10px);

      animation:textReveal 1.2s ease forwards;
      animation-delay:.8s;
    }

    .small{
      font-size:11px;

      letter-spacing:0.34em;
      text-transform:uppercase;

      color:rgba(255,255,255,0.38);

      margin-bottom:14px;

      font-weight:500;
    }

    .highlight{
      color:#ffffff;
      font-weight:500;
    }

    @keyframes loading{

      0%{
        width:0%;
      }

      15%{
        width:12%;
      }

      35%{
        width:34%;
      }

      55%{
        width:58%;
      }

      75%{
        width:79%;
      }

      90%{
        width:93%;
      }

      100%{
        width:100%;
      }

    }

    @keyframes logoReveal{

      to{
        opacity:1;
        transform:translateY(0) scale(1);
      }

    }

    @keyframes textReveal{

      to{
        opacity:1;
        transform:translateY(0);
      }

    }

    @keyframes fadeIn{

      from{
        opacity:0;
      }

      to{
        opacity:1;
      }

    }

    @media(max-width:768px){

      .logo{
        width:120px;
      }

      .progress-container{
        width:240px;
      }

      .text{
        font-size:14px;
        padding:0 28px;
      }

    }

  </style>
