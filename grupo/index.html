  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      font-family: Arial, Helvetica, sans-serif;
      overflow: hidden;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      color: #fff;
    }

    .container {
      width: 100%;
      max-width: 360px;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .logo {
      width: 130px;
      max-width: 70%;
      margin-bottom: 36px;
      animation: fadeIn 1s ease forwards;
    }

    .loading-box {
      width: 100%;
      height: 4px;
      background: rgba(255, 255, 255, 0.15);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .loading-bar {
      width: 0%;
      height: 100%;
      background: #fff;
      border-radius: 999px;
      animation: loading 5s linear forwards;
    }

    .text {
      font-size: 16px;
      line-height: 1.45;
      font-weight: 400;
      color: rgba(255, 255, 255, 0.88);
      opacity: 0;
      transform: translateY(10px);
      animation: textAppear 1s ease forwards;
      animation-delay: 0.4s;
    }

    @keyframes loading {
      from {
        width: 0%;
      }
      to {
        width: 100%;
      }
    }

    @keyframes textAppear {
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: scale(0.96);
      }
      to {
        opacity: 1;
        transform: scale(1);
      }
    }
  </style>
</head>

  <div class="container">
